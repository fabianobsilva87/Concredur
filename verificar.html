<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concredur — Verificação de Documento</title>
  <!-- Fase 1: config.js fornece SUPABASE_URL e SUPABASE_ANON_KEY -->
  <script src="config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', Arial, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 16px; color: #1a202c; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); max-width: 560px; width: 100%; overflow: hidden; }
    .header { background: #1a56db; color: #fff; padding: 24px 28px; display: flex; align-items: center; gap: 14px; }
    .header-icon { font-size: 32px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    .status-banner { display: flex; align-items: center; gap: 12px; padding: 16px 28px; font-weight: 700; font-size: 15px; }
    .status-banner.valido   { background: #d1fae5; color: #065f46; border-bottom: 2px solid #6ee7b7; }
    .status-banner.invalido { background: #fee2e2; color: #991b1b; border-bottom: 2px solid #fca5a5; }
    .status-banner.loading  { background: #f1f5f9; color: #64748b; border-bottom: 2px solid #e2e8f0; }
    .status-icon { font-size: 22px; }
    .body { padding: 22px 28px; overflow: hidden; }

    /* Grid de campos — colunas com largura mínima para não estourar */
    .field-group { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 20px; margin-bottom: 16px; }
    .field { min-width: 0; overflow: hidden; }
    .field label { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 2px; }
    .field span  { font-size: 14px; font-weight: 600; color: #1a202c; display: block; word-break: break-word; overflow-wrap: anywhere; }
    .field.full  { grid-column: span 2; }

    /* Parágrafos de texto longo (laudo, descrição) */
    .body p, .body div { max-width: 100%; }
    p { word-break: break-word; overflow-wrap: anywhere; }

    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 16px 0; }
    .tag-tipo { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .tag-pmoc { background: #dbeafe; color: #1e40af; }
    .tag-os   { background: #ede9fe; color: #5b21b6; }
    .tag-eq   { background: #f0fdf4; color: #166534; }
    .checklist-mini { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; table-layout: fixed; }
    .checklist-mini th { background: #f1f5f9; color: #64748b; padding: 5px 8px; text-align: left; font-size: 10px; text-transform: uppercase; }
    .checklist-mini td { padding: 4px 8px; border-bottom: 1px solid #f1f5f9; word-break: break-word; }
    .ok  { color: #059669; font-weight: 700; }
    .nok { color: #dc2626; font-weight: 700; }
    .na  { color: #a0aec0; }
    .assinatura-row { display: flex; gap: 24px; margin-top: 16px; }
    .assinatura-box { flex: 1; min-width: 0; text-align: center; }
    .assinatura-box img { max-width: 160px; max-height: 55px; display: block; margin: 0 auto; border: 1px solid #e2e8f0; border-radius: 4px; }
    .assinatura-box .linha { border-top: 1px solid #64748b; margin-top: 6px; padding-top: 4px; font-size: 10px; color: #64748b; word-break: break-word; }
    .footer { padding: 14px 28px; background: #f8fafc; border-top: 1px solid #e2e8f0; font-size: 10px; color: #94a3b8; text-align: center; }
    .footer a { color: #1a56db; text-decoration: none; }
    .spinner { width: 36px; height: 36px; border: 4px solid #e2e8f0; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 32px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Caixas de texto de laudo/descrição dentro do histórico */
    .txt-box { font-size: 11px; color: #4a5568; background: #fff; padding: 6px 8px;
               border-radius: 4px; border: 1px solid #e2e8f0;
               word-break: break-word; overflow-wrap: anywhere; white-space: pre-wrap; }

    @media (max-width: 500px) {
      .field-group { grid-template-columns: 1fr; }
      .field.full  { grid-column: span 1; }
      .assinatura-row { flex-direction: column; }
      .body { padding: 16px; }
      .header { padding: 16px; }
      .status-banner { padding: 12px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="header-icon">🏗️</div>
    <div>
      <h1>Concredur — Verificação de Autenticidade</h1>
      <p>Sistema de Gestão de Manutenção</p>
    </div>
  </div>

  <div id="status-banner" class="status-banner loading">
    <span class="status-icon">⏳</span>
    <span id="status-texto">Consultando base de dados...</span>
  </div>

  <div class="body" id="corpo">
    <div class="spinner" id="spinner"></div>
  </div>

  <div class="footer">
    Documento verificado em <strong id="data-verificacao"></strong> &nbsp;·&nbsp;
    <a href="dashboard.html">Acessar o Sistema</a>
  </div>
</div>

<script>
  // Fase 1: credenciais vêm de config.js (já carregado no <head>)
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.getElementById('data-verificacao').textContent = new Date().toLocaleString('pt-BR');

  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  const tipo   = params.get('tipo');

  // Fase 3: escapeHTML contra XSS no innerHTML
  function escapeHTML(str) {
    if (str === null || str === undefined) return '—';
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // Compatibilidade: lê meta_pmoc (novo) com fallback para observacoes regex (legado)
  function lerMetaPMOC(ficha) {
    if (ficha.meta_pmoc && Object.keys(ficha.meta_pmoc).length > 0) return ficha.meta_pmoc;
    const obs = ficha.observacoes || '';
    const m = (p) => { const r = obs.match(p); return r ? r[1] : null; };
    return {
      data_inspecao:    m(/\[DataInspecao:\s*([^\]]+)\]/),
      frequencia:       m(/\[Frequencia:\s*([^\]]+)\]/)     || 'Mensal',
      tipo_equipamento: m(/\[TipoEquipamento:\s*([^\]]+)\]/)|| 'OUT',
      checklist:        (() => { try { return JSON.parse(m(/\[Checklist:\s*(\{[^\]]+\})\]/)||'{}'); } catch(e) { return {}; } })(),
      fiscal_nome:      (m(/\[FiscalNome:\s*([^\]]+)\]/)    || '—').trim(),
      _obsLimpa:        obs.replace(/\[[^\]]+\]/g,'').trim(),
    };
  }

  // Compatibilidade: URL Storage com fallback para Base64 legado
  function lerAssinatura(obj, campoUrl, campoBase64) {
    if (!obj) return null;
    if (obj[campoUrl]) return obj[campoUrl];
    if (obj[campoBase64]?.startsWith('data:image')) return obj[campoBase64];
    return null;
  }

  function mostrarErro(msg) {
    const sp = document.getElementById('spinner');
    if (sp) sp.remove();
    document.getElementById('status-banner').className = 'status-banner invalido';
    document.getElementById('status-texto').textContent = msg;
    const p = document.createElement('p');
    p.style.cssText = 'color:#991b1b;font-size:13px;text-align:center;padding:20px 0;';
    p.textContent = '⚠️ Não foi possível verificar este documento.';
    const small = document.createElement('span');
    small.style.cssText = 'font-size:11px;color:#a0aec0;margin-top:6px;display:block;';
    small.textContent = `ID: ${id||'não informado'} · Tipo: ${tipo||'não informado'}`;
    p.appendChild(small);
    document.getElementById('corpo').innerHTML = '';
    document.getElementById('corpo').appendChild(p);
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('pt-BR');
  }

  function statusBadge(status) {
    const cores = {
      'Aberta':       { bg:'#fef3c7', txt:'#92400e' },
      'Em Andamento': { bg:'#dbeafe', txt:'#1e40af' },
      'Concluída':    { bg:'#d1fae5', txt:'#065f46' },
    };
    const c = cores[status] || { bg:'#f1f5f9', txt:'#475569' };
    return `<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:12px;background:${c.bg};color:${c.txt};">${escapeHTML(status||'—')}</span>`;
  }

  function assinaturaHTML(url) {
    return url
      ? `<img src="${url}" alt="Assinatura" style="max-width:160px;max-height:55px;display:block;margin:0 auto;border:1px solid #e2e8f0;border-radius:4px;">`
      : `<div style="height:45px;border-bottom:1px dashed #94a3b8;"></div>`;
  }

  async function verificar() {
    if (!id || !tipo) { mostrarErro('Parâmetros de verificação inválidos ou ausentes.'); return; }

    try {
      // ════════════════════════ PMOC ════════════════════════
      if (tipo === 'pmoc') {
        const { data: f, error } = await db
          .from('fichas_pmoc')
          .select('*, equipamentos(tag,produto,marca,bloco,setor,sala)')
          .eq('id', id)
          .single();
        if (error || !f) { mostrarErro('Laudo PMOC não encontrado na base de dados.'); return; }

        // Lê meta_pmoc (novo JSONB) com fallback automático para observacoes legado
        const meta       = lerMetaPMOC(f);
        const dataInsp   = meta.data_inspecao    || fmtDate(f.created_at);
        const freq       = meta.frequencia       || '—';
        const tipo_eq    = meta.tipo_equipamento || '—';
        const fiscalNome = meta.fiscal_nome      || '—';
        const checklist  = meta.checklist        || {};
        const eq         = f.equipamentos        || {};
        const codigo     = `L-PMOC-${f.id.toString().slice(0,6).toUpperCase()}`;

        const labelChk = {
          'limpeza-filtro':'Limpeza de Filtro','limpeza-evaporadora':'Limpeza Evaporadora',
          'limpeza-condensadora':'Limpeza Condensadora','verificacao-dreno':'Verificação de Dreno',
          'verificacao-eletrica':'Verificação Elétrica','verificacao-fluido':'Verificação de Fluido',
          'teste-operacao':'Teste de Operação','verificacao-ruidos':'Verificação de Ruídos','limpeza-geral':'Limpeza Geral',
        };
        const statusChk = { OK:'<span class="ok">✓ OK</span>', NOK:'<span class="nok">✗ NOK</span>', NA:'<span class="na">N/A</span>' };
        const chkRows = Object.entries(checklist).map(([k,v]) =>
          `<tr><td>${escapeHTML(labelChk[k]||k)}</td><td style="text-align:center;">${statusChk[v]||escapeHTML(v)}</td></tr>`
        ).join('');

        document.getElementById('status-banner').className = 'status-banner valido';
        document.getElementById('status-texto').textContent = `✅ Documento autêntico — ${codigo}`;
        document.getElementById('spinner').remove();
        document.getElementById('corpo').innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <span class="tag-tipo tag-pmoc">📋 PMOC</span>
            <strong style="font-size:15px;">${escapeHTML(codigo)}</strong>
            <span style="font-size:11px;color:#94a3b8;margin-left:auto;">Emitido em ${fmtDate(f.created_at)}</span>
          </div>
          <div class="field-group">
            <div class="field"><label>TAG do Ativo</label><span>${escapeHTML(eq.tag)}</span></div>
            <div class="field"><label>Equipamento</label><span>${escapeHTML(eq.produto||tipo_eq)}</span></div>
            <div class="field"><label>Marca</label><span>${escapeHTML(eq.marca)}</span></div>
            <div class="field"><label>Localização</label><span>${escapeHTML([eq.bloco,eq.setor,eq.sala].filter(Boolean).join(' › '))||'—'}</span></div>
            <div class="field"><label>Técnico Executor</label><span>${escapeHTML(f.tecnico_nome)}</span></div>
            <div class="field"><label>Data da Inspeção</label><span>${escapeHTML(dataInsp)}</span></div>
            <div class="field"><label>Frequência</label><span>${escapeHTML(freq)}</span></div>
            <div class="field"><label>Fiscal / Validador</label><span>${escapeHTML(fiscalNome)}</span></div>
          </div>
          ${chkRows ? `
          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Checklist de Manutenção</div>
          <table class="checklist-mini">
            <thead><tr><th>Item</th><th style="text-align:center;">Status</th></tr></thead>
            <tbody>${chkRows}</tbody>
          </table>` : ''}
          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Assinaturas</div>
          <div class="assinatura-row">
            <div class="assinatura-box">${assinaturaHTML(lerAssinatura(f,'assinatura_tecnico_url','assinatura_digital'))}<div class="linha">${escapeHTML(f.tecnico_nome)}<br>Técnico Executor</div></div>
            <div class="assinatura-box">${assinaturaHTML(lerAssinatura(f,'assinatura_fiscal_url','assinatura_fiscal'))}<div class="linha">${escapeHTML(fiscalNome)}<br>Fiscal / Validador</div></div>
          </div>`;

      // ════════════════════════ OS ════════════════════════
      } else if (tipo === 'os') {
        const { data: os, error } = await db
          .from('ordens_servico')
          .select('*, equipamentos(tag,produto,bloco,setor,nr_serie), colaboradores(nome,assinatura_url,assinatura_digital)')
          .eq('id', id)
          .single();
        if (error || !os) { mostrarErro('Ordem de Serviço não encontrada na base de dados.'); return; }

        const col    = os.colaboradores || {};
        const eq     = os.equipamentos  || {};
        const codigo = `OS-AC-${os.id.toString().slice(0,5).toUpperCase()}`;
        const statusCor = { 'Aberta':'#fef3c7','Em Andamento':'#dbeafe','Concluída':'#d1fae5' };
        const statusTxt = { 'Aberta':'#92400e','Em Andamento':'#1e40af','Concluída':'#065f46' };
        const st = os.status_os || 'Aberta';

        document.getElementById('status-banner').className = 'status-banner valido';
        document.getElementById('status-texto').textContent = `✅ Documento autêntico — ${codigo}`;
        document.getElementById('spinner').remove();
        document.getElementById('corpo').innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <span class="tag-tipo tag-os">🛠️ O.S.</span>
            <strong style="font-size:15px;">${escapeHTML(codigo)}</strong>
            <span style="font-size:11px;font-weight:700;padding:2px 10px;border-radius:12px;margin-left:auto;background:${statusCor[st]||'#f1f5f9'};color:${statusTxt[st]||'#374151'}">${escapeHTML(st)}</span>
          </div>
          <div class="field-group">
            <div class="field"><label>TAG do Ativo</label><span>${escapeHTML(eq.tag)}</span></div>
            <div class="field"><label>Equipamento</label><span>${escapeHTML(eq.produto)}</span></div>
            <div class="field"><label>Localização</label><span>${escapeHTML([eq.bloco,eq.setor].filter(Boolean).join(' › '))||'—'}</span></div>
            <div class="field"><label>Nº Série</label><span>${escapeHTML(eq.nr_serie)}</span></div>
            <div class="field"><label>Técnico Responsável</label><span>${escapeHTML(col.nome)}</span></div>
            <div class="field"><label>Tipo de Manutenção</label><span>${escapeHTML(os.tipo_os)}</span></div>
            <div class="field full"><label>Abertura da O.S.</label><span>${fmtDate(os.created_at)}</span></div>
          </div>
          ${os.descricao_defeito ? `<hr class="divider"><div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Descrição da Ocorrência</div><p class="txt-box" style="font-size:12px;">${escapeHTML(os.descricao_defeito)}</p>` : ''}
          ${os.laudo_tecnico ? `<hr class="divider"><div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Diagnóstico / Ações</div><p class="txt-box" style="font-size:12px;">${escapeHTML(os.laudo_tecnico)}</p>` : ''}
          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Assinatura do Técnico</div>
          <div class="assinatura-row">
            <div class="assinatura-box">${assinaturaHTML(lerAssinatura(col,'assinatura_url','assinatura_digital'))}<div class="linha">${escapeHTML(col.nome||'—')}<br>Técnico Executor</div></div>
          </div>`;

      // ════════════════════════ EQUIPAMENTO ════════════════════════
      } else if (tipo === 'equipamento') {
        const { data: eq, error } = await db
          .from('equipamentos')
          .select('*')
          .eq('qrcode_token', id)
          .single();
        if (error || !eq) { mostrarErro('Equipamento não encontrado na base de dados.'); return; }

        const critCor = { Alta:{ bg:'#fee2e2',txt:'#991b1b' }, Média:{ bg:'#fef3c7',txt:'#92400e' }, Baixa:{ bg:'#d1fae5',txt:'#065f46' } };
        const crit    = eq.criticidade || 'Média';
        const cs      = critCor[crit] || critCor['Média'];
        const catLabel = { AC:'❄️ Ar Condicionado', BEB:'💧 Bebedouro', CLIM:'🌀 Climatizador Evaporativo', VEN:'💨 Ventilador/Exaustor', OUT:'🔧 Outros' };
        const codigo  = `EQ-${(eq.tag||eq.id.toString().slice(0,6)).toUpperCase()}`;
        const extras  = eq.extras_tecnico || {};
        const extraFields = Object.entries(extras).map(([k,v]) =>
          `<div class="field"><label>${escapeHTML(k.replace(/-/g,' '))}</label><span>${escapeHTML(v)}</span></div>`
        ).join('');

        document.getElementById('status-banner').className = 'status-banner valido';
        document.getElementById('status-texto').textContent = `✅ Ativo autêntico — ${codigo}`;
        document.getElementById('spinner').remove();
        document.getElementById('corpo').innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
            <span class="tag-tipo tag-eq">🏷️ Ativo</span>
            <strong style="font-size:15px;">${escapeHTML(codigo)}</strong>
            <span style="font-size:11px;font-weight:700;padding:2px 10px;border-radius:12px;margin-left:auto;background:${cs.bg};color:${cs.txt};">Classe ${escapeHTML(crit)}</span>
          </div>
          <div class="field-group">
            <div class="field"><label>TAG do Ativo</label><span>${escapeHTML(eq.tag)}</span></div>
            <div class="field"><label>Categoria</label><span>${escapeHTML(catLabel[eq.categoria]||eq.categoria)}</span></div>
            <div class="field"><label>Equipamento / Produto</label><span>${escapeHTML(eq.produto)}</span></div>
            <div class="field"><label>Marca</label><span>${escapeHTML(eq.marca)}</span></div>
            <div class="field"><label>Nº de Série</label><span>${escapeHTML(eq.nr_serie)}</span></div>
            <div class="field"><label>Patrimônio</label><span>${escapeHTML(eq.patrimonio)}</span></div>
            <div class="field"><label>Potência</label><span>${escapeHTML(eq.potencia)}</span></div>
            <div class="field"><label>Instituição</label><span>${escapeHTML(eq.instituicao)}</span></div>
            <div class="field full"><label>Localização</label><span>${escapeHTML([eq.bloco,eq.setor,eq.sala].filter(Boolean).join(' › '))||'—'}</span></div>
          </div>
          ${extraFields ? `<hr class="divider"><div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Dados Técnicos Específicos</div><div class="field-group">${extraFields}</div>` : ''}
          ${eq.validade ? `<hr class="divider"><div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Validade / Próxima Troca</div><p style="font-size:13px;font-weight:600;color:#1a202c;">${fmtDate(eq.validade)}</p>` : ''}
          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Registro do Ativo</div>
          <p style="font-size:12px;color:#4a5568;">Cadastrado em: <strong>${fmtDate(eq.created_at)}</strong></p>
          <div id="historico-ativo"></div>`;

        // ── Histórico: fichas PMOC + Ordens de Serviço vinculadas a este equipamento ──
        await carregarHistoricoAtivo(eq.id);

      } else {
        mostrarErro('Tipo de documento desconhecido.');
      }

    } catch (err) {
      mostrarErro('Erro ao consultar: ' + err.message);
    }
  }

  // Busca e renderiza o histórico de PMOC e O.S. de um equipamento
  async function carregarHistoricoAtivo(equipamentoId) {
    const alvo = document.getElementById('historico-ativo');
    if (!alvo) return;

    const [pmocRes, osRes] = await Promise.allSettled([
      db.from('fichas_pmoc')
        .select('id, created_at, tecnico_nome, observacoes, meta_pmoc, foto_url, assinatura_tecnico_url, assinatura_fiscal_url, assinatura_digital')
        .eq('equipamento_id', equipamentoId)
        .order('created_at', { ascending: false }),
      db.from('ordens_servico')
        .select('id, created_at, tipo_os, status_os, descricao_defeito, laudo_tecnico, foto_url, colaboradores(nome)')
        .eq('equipamento_id', equipamentoId)
        .order('created_at', { ascending: false }),
    ]);

    const fichas = pmocRes.status === 'fulfilled' ? (pmocRes.value?.data || []) : [];
    const oss    = osRes.status   === 'fulfilled' ? (osRes.value?.data   || []) : [];

    const labelChk = {
      'limpeza-filtro':'Limpeza de Filtro','limpeza-evaporadora':'Limpeza Evaporadora',
      'limpeza-condensadora':'Limpeza Condensadora','verificacao-dreno':'Verificação de Dreno',
      'verificacao-eletrica':'Verificação Elétrica','verificacao-fluido':'Verificação de Fluido',
      'teste-operacao':'Teste de Operação','verificacao-ruidos':'Verificação de Ruídos','limpeza-geral':'Limpeza Geral',
    };
    const statusChk = {
      OK:'<span style="color:#059669;font-weight:700;">✓ OK</span>',
      NOK:'<span style="color:#dc2626;font-weight:700;">✗ NOK</span>',
      NA:'<span style="color:#a0aec0;">N/A</span>',
    };

    // ── Bloco PMOC ──
    let pmocHTML = '';
    if (fichas.length) {
      const itens = fichas.map((f, i) => {
        const meta = lerMetaPMOC(f);
        const dataInsp = meta.data_inspecao ? fmtDate(meta.data_inspecao) : fmtDate(f.created_at);
        const freq     = meta.frequencia || '—';
        const tipo     = meta.tipo_equipamento || '—';
        const fiscal   = meta.fiscal_nome || '—';
        const obs      = meta._obsLimpa || f.observacoes || '';
        const checklist = meta.checklist || {};
        const chkRows = Object.entries(checklist).map(([k,v]) =>
          `<tr><td style="padding:3px 6px;font-size:11px;">${escapeHTML(labelChk[k]||k)}</td><td style="padding:3px 6px;text-align:center;font-size:11px;">${statusChk[v]||escapeHTML(v)}</td></tr>`
        ).join('');
        const assinTec = lerAssinatura(f, 'assinatura_tecnico_url', 'assinatura_digital');
        const assinFis = lerAssinatura(f, 'assinatura_fiscal_url', 'assinatura_fiscal');

        const detalhes = `
          <div id="pmoc-det-${i}" style="display:none;border-top:1px dashed #cbd5e0;margin-top:8px;padding-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">
              <div style="font-size:11px;"><span style="color:#a0aec0;">Tipo:</span> <strong>${escapeHTML(tipo)}</strong></div>
              <div style="font-size:11px;"><span style="color:#a0aec0;">Frequência:</span> <strong>${escapeHTML(freq)}</strong></div>
              <div style="font-size:11px;"><span style="color:#a0aec0;">Técnico:</span> <strong>${escapeHTML(f.tecnico_nome)}</strong></div>
              <div style="font-size:11px;"><span style="color:#a0aec0;">Fiscal:</span> <strong>${escapeHTML(fiscal)}</strong></div>
            </div>
            ${chkRows ? `<div style="font-size:10px;color:#718096;text-transform:uppercase;margin:6px 0 3px;">Checklist de Manutenção</div><table style="width:100%;border-collapse:collapse;background:#fff;border:1px solid #e2e8f0;border-radius:4px;">${chkRows}</table>` : ''}
            ${obs ? `<div style="font-size:10px;color:#718096;text-transform:uppercase;margin:8px 0 3px;">Observações</div><div class="txt-box">${escapeHTML(obs)}</div>` : ''}
            ${f.foto_url ? `<div style="font-size:10px;color:#718096;text-transform:uppercase;margin:8px 0 3px;">Evidência Fotográfica</div><img src="${f.foto_url}" style="max-width:100%;max-height:180px;border-radius:4px;border:1px solid #e2e8f0;">` : ''}
            ${(assinTec || assinFis) ? `<div style="font-size:10px;color:#718096;text-transform:uppercase;margin:8px 0 3px;">Assinaturas</div><div style="display:flex;gap:12px;flex-wrap:wrap;">
              ${assinTec ? `<div style="text-align:center;"><img src="${assinTec}" style="max-width:140px;max-height:50px;border-bottom:1px solid #cbd5e0;"><div style="font-size:9px;color:#718096;">Técnico</div></div>` : ''}
              ${assinFis ? `<div style="text-align:center;"><img src="${assinFis}" style="max-width:140px;max-height:50px;border-bottom:1px solid #cbd5e0;"><div style="font-size:9px;color:#718096;">Fiscal</div></div>` : ''}
            </div>` : ''}
          </div>`;

        return `
          <div style="border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#f8fafc;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
              <strong style="font-size:12px;color:#1e3a5f;">📋 Inspeção ${dataInsp}</strong>
              <span style="font-size:10px;color:#718096;">${escapeHTML(freq)}</span>
            </div>
            <div style="font-size:11px;color:#4a5568;">Técnico: <strong>${escapeHTML(f.tecnico_nome)}</strong></div>
            <button onclick="toggleDetalhe('pmoc-det-${i}', this)" style="margin-top:6px;font-size:11px;padding:4px 12px;background:#1e3a5f;color:#fff;border:none;border-radius:5px;cursor:pointer;">🔍 Ver detalhes</button>
            ${detalhes}
          </div>`;
      }).join('');
      pmocHTML = `
        <hr class="divider">
        <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">
          📋 Fichas PMOC (${fichas.length})
        </div>
        ${itens}`;
    } else {
      pmocHTML = `
        <hr class="divider">
        <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">📋 Fichas PMOC</div>
        <p style="font-size:12px;color:#a0aec0;">Nenhuma ficha PMOC registrada para este ativo.</p>`;
    }

    // ── Bloco Ordens de Serviço ──
    let osHTML = '';
    if (oss.length) {
      const itens = oss.map((os, i) => {
        const codigo = `OS-${os.id.toString().slice(0,6).toUpperCase()}`;
        const detalhes = `
          <div id="os-det-${i}" style="display:none;border-top:1px dashed #cbd5e0;margin-top:8px;padding-top:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;">
              <div style="font-size:11px;"><span style="color:#a0aec0;">Tipo:</span> <strong>${escapeHTML(os.tipo_os)}</strong></div>
              <div style="font-size:11px;"><span style="color:#a0aec0;">Status:</span> ${statusBadge(os.status_os)}</div>
              <div style="font-size:11px;"><span style="color:#a0aec0;">Data:</span> <strong>${fmtDate(os.created_at)}</strong></div>
              <div style="font-size:11px;"><span style="color:#a0aec0;">Técnico:</span> <strong>${escapeHTML(os.colaboradores?.nome||'—')}</strong></div>
            </div>
            ${os.descricao_defeito ? `<div style="font-size:10px;color:#718096;text-transform:uppercase;margin:6px 0 3px;">Ocorrência / Sintomas</div><div class="txt-box">${escapeHTML(os.descricao_defeito)}</div>` : ''}
            ${os.laudo_tecnico ? `<div style="font-size:10px;color:#718096;text-transform:uppercase;margin:8px 0 3px;">Diagnóstico / Ações Executadas</div><div class="txt-box">${escapeHTML(os.laudo_tecnico)}</div>` : ''}
            ${os.foto_url ? `<div style="font-size:10px;color:#718096;text-transform:uppercase;margin:8px 0 3px;">Evidência Fotográfica</div><img src="${os.foto_url}" style="max-width:100%;max-height:180px;border-radius:4px;border:1px solid #e2e8f0;">` : ''}
          </div>`;

        return `
          <div style="border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#f8fafc;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
              <strong style="font-size:12px;color:#1e3a5f;">🛠️ ${escapeHTML(codigo)} — ${escapeHTML(os.tipo_os)}</strong>
              ${statusBadge(os.status_os)}
            </div>
            <div style="font-size:10px;color:#a0aec0;margin-bottom:4px;">${fmtDate(os.created_at)}${os.colaboradores?.nome ? ' · ' + escapeHTML(os.colaboradores.nome) : ''}</div>
            <button onclick="toggleDetalhe('os-det-${i}', this)" style="margin-top:2px;font-size:11px;padding:4px 12px;background:#1e3a5f;color:#fff;border:none;border-radius:5px;cursor:pointer;">🔍 Ver detalhes</button>
            ${detalhes}
          </div>`;
      }).join('');
      osHTML = `
        <hr class="divider">
        <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">
          🛠️ Ordens de Serviço (${oss.length})
        </div>
        ${itens}`;
    } else {
      osHTML = `
        <hr class="divider">
        <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">🛠️ Ordens de Serviço</div>
        <p style="font-size:12px;color:#a0aec0;">Nenhuma O.S. registrada para este ativo.</p>`;
    }

    alvo.innerHTML = pmocHTML + osHTML;
  }

  // Expande/recolhe o painel de detalhes de um item do histórico
  function toggleDetalhe(id, btn) {
    const el = document.getElementById(id);
    if (!el) return;
    const aberto = el.style.display !== 'none';
    el.style.display = aberto ? 'none' : 'block';
    if (btn) btn.textContent = aberto ? '🔍 Ver detalhes' : '✕ Ocultar detalhes';
  }


  verificar();
</script>
</body>
</html>
