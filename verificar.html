<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concredur — Verificação de Documento</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', Arial, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 32px 16px; color: #1a202c; }

    .card { background: #fff; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); max-width: 560px; width: 100%; overflow: hidden; }

    /* Header */
    .header { background: #1a56db; color: #fff; padding: 24px 28px; display: flex; align-items: center; gap: 14px; }
    .header-icon { font-size: 32px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }

    /* Status banner */
    .status-banner { display: flex; align-items: center; gap: 12px; padding: 16px 28px; font-weight: 700; font-size: 15px; }
    .status-banner.valido   { background: #d1fae5; color: #065f46; border-bottom: 2px solid #6ee7b7; }
    .status-banner.invalido { background: #fee2e2; color: #991b1b; border-bottom: 2px solid #fca5a5; }
    .status-banner.loading  { background: #f1f5f9; color: #64748b; border-bottom: 2px solid #e2e8f0; }
    .status-icon { font-size: 22px; }

    /* Body */
    .body { padding: 22px 28px; }

    .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; margin-bottom: 16px; }
    .field { }
    .field label { font-size: 10px; color: #718096; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 2px; }
    .field span  { font-size: 14px; font-weight: 600; color: #1a202c; }
    .field.full  { grid-column: span 2; }

    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 16px 0; }

    .tag-tipo { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .tag-pmoc { background: #dbeafe; color: #1e40af; }
    .tag-os   { background: #ede9fe; color: #5b21b6; }

    .checklist-mini { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
    .checklist-mini th { background: #f1f5f9; color: #64748b; padding: 5px 8px; text-align: left; font-size: 10px; text-transform: uppercase; }
    .checklist-mini td { padding: 4px 8px; border-bottom: 1px solid #f1f5f9; }
    .ok  { color: #059669; font-weight: 700; }
    .nok { color: #dc2626; font-weight: 700; }
    .na  { color: #a0aec0; }

    .assinatura-row { display: flex; gap: 24px; margin-top: 16px; }
    .assinatura-box { flex: 1; text-align: center; }
    .assinatura-box img { max-width: 160px; max-height: 55px; display: block; margin: 0 auto; border: 1px solid #e2e8f0; border-radius: 4px; }
    .assinatura-box .linha { border-top: 1px solid #64748b; margin-top: 6px; padding-top: 4px; font-size: 10px; color: #64748b; }

    .footer { padding: 14px 28px; background: #f8fafc; border-top: 1px solid #e2e8f0; font-size: 10px; color: #94a3b8; text-align: center; }
    .footer a { color: #1a56db; text-decoration: none; }

    .spinner { width: 36px; height: 36px; border: 4px solid #e2e8f0; border-top-color: #1a56db; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 32px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      .field-group { grid-template-columns: 1fr; }
      .field.full  { grid-column: span 1; }
      .assinatura-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="header-icon">🏗️</div>
    <div>
      <h1>Concredur — Verificação de Autenticidade</h1>
      <p>Sistema de Gestão de Manutenção</p>
    </div>
  </div>

  <div id="status-banner" class="status-banner loading">
    <span class="status-icon">⏳</span>
    <span id="status-texto">Consultando base de dados...</span>
  </div>

  <div class="body" id="corpo">
    <div class="spinner" id="spinner"></div>
  </div>

  <div class="footer">
    Documento verificado em <strong id="data-verificacao"></strong> &nbsp;·&nbsp;
    <a href="dashboard.html">Acessar o Sistema</a>
  </div>
</div>

<script>
  const SUPABASE_URL      = "https://nweligwbglblbncaegir.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53ZWxpZ3diZ2xibGJuY2FlZ2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzAzNTgsImV4cCI6MjA5NTYwNjM1OH0.6eKcn40QmcfvHKAxuDH3kB6vHBJUu5LUVzfr27dvbKk";
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.getElementById('data-verificacao').textContent = new Date().toLocaleString('pt-BR');

  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  const tipo   = params.get('tipo'); // 'pmoc' ou 'os'

  function mostrarErro(msg) {
    document.getElementById('spinner').remove();
    document.getElementById('status-banner').className = 'status-banner invalido';
    document.getElementById('status-texto').textContent = msg;
    document.getElementById('corpo').innerHTML = `
      <p style="color:#991b1b; font-size:13px; text-align:center; padding: 20px 0;">
        ⚠️ Não foi possível verificar este documento.<br>
        <span style="font-size:11px; color:#a0aec0; margin-top:6px; display:block;">ID: ${id || 'não informado'} · Tipo: ${tipo || 'não informado'}</span>
      </p>`;
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('pt-BR');
  }

  async function verificar() {
    if (!id || !tipo) { mostrarErro('Parâmetros de verificação inválidos ou ausentes.'); return; }

    try {
      if (tipo === 'pmoc') {
        const { data: f, error } = await db
          .from('fichas_pmoc')
          .select('*, equipamentos(tag, produto, marca, bloco, setor, sala)')
          .eq('id', id)
          .single();

        if (error || !f) { mostrarErro('Laudo PMOC não encontrado na base de dados.'); return; }

        const matchData  = (f.observacoes || '').match(/\[DataInspecao:\s*([^\]]+)\]/);
        const matchFreq  = (f.observacoes || '').match(/\[Frequencia:\s*([^\]]+)\]/);
        const matchTipo  = (f.observacoes || '').match(/\[TipoEquipamento:\s*([^\]]+)\]/);
        const matchChk   = (f.observacoes || '').match(/\[Checklist:\s*([^\]]+)\]/);
        const matchFiscal = (f.observacoes || '').match(/\[FiscalNome:\s*([^\]]+)\]/);
        const checklist  = matchChk ? (() => { try { return JSON.parse(matchChk[1]); } catch(e) { return {}; } })() : {};
        const dataInsp   = matchData ? matchData[1] : fmtDate(f.created_at);
        const freq       = matchFreq ? matchFreq[1] : '—';
        const tipo_eq    = matchTipo ? matchTipo[1] : '—';
        const fiscalNome = matchFiscal ? matchFiscal[1].trim() : '—';
        const eq         = f.equipamentos || {};
        const codigo     = `L-PMOC-${f.id.toString().slice(0,6).toUpperCase()}`;

        const labelChk = {
          'limpeza-filtro':'Limpeza de Filtro','limpeza-evaporadora':'Limpeza Evaporadora','limpeza-condensadora':'Limpeza Condensadora',
          'verificacao-dreno':'Verificação de Dreno','verificacao-eletrica':'Verificação Elétrica','verificacao-fluido':'Verificação de Fluido',
          'teste-operacao':'Teste de Operação','verificacao-ruidos':'Verificação de Ruídos','limpeza-geral':'Limpeza Geral',
        };
        const statusChk = { 'OK':'<span class="ok">✓ OK</span>', 'NOK':'<span class="nok">✗ NOK</span>', 'NA':'<span class="na">N/A</span>' };
        const chkRows = Object.entries(checklist).map(([k,v]) =>
          `<tr><td>${labelChk[k] || k}</td><td style="text-align:center;">${statusChk[v] || v}</td></tr>`
        ).join('');

        const assinaturaTecnicoHTML = f.assinatura_digital?.startsWith('data:image')
          ? `<img src="${f.assinatura_digital}" alt="Assinatura Técnico">`
          : `<div style="height:45px;border-bottom:1px dashed #94a3b8;"></div>`;
        const assinaturaFiscalHTML = f.assinatura_fiscal?.startsWith('data:image')
          ? `<img src="${f.assinatura_fiscal}" alt="Assinatura Fiscal">`
          : `<div style="height:45px;border-bottom:1px dashed #94a3b8;"></div>`;

        document.getElementById('status-banner').className = 'status-banner valido';
        document.getElementById('status-texto').textContent = `✅ Documento autêntico — ${codigo}`;
        document.getElementById('spinner').remove();
        document.getElementById('corpo').innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <span class="tag-tipo tag-pmoc">📋 PMOC</span>
            <strong style="font-size:15px;">${codigo}</strong>
            <span style="font-size:11px;color:#94a3b8;margin-left:auto;">Emitido em ${fmtDate(f.created_at)}</span>
          </div>

          <div class="field-group">
            <div class="field"><label>TAG do Ativo</label><span>${eq.tag || '—'}</span></div>
            <div class="field"><label>Equipamento</label><span>${eq.produto || tipo_eq}</span></div>
            <div class="field"><label>Marca</label><span>${eq.marca || '—'}</span></div>
            <div class="field"><label>Localização</label><span>${[eq.bloco, eq.setor, eq.sala].filter(Boolean).join(' › ') || '—'}</span></div>
            <div class="field"><label>Técnico Executor</label><span>${f.tecnico_nome}</span></div>
            <div class="field"><label>Data da Inspeção</label><span>${dataInsp}</span></div>
            <div class="field"><label>Frequência</label><span>${freq}</span></div>
            <div class="field"><label>Fiscal / Validador</label><span>${fiscalNome}</span></div>
          </div>

          ${chkRows ? `
          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Checklist de Manutenção</div>
          <table class="checklist-mini">
            <thead><tr><th>Item</th><th style="text-align:center;">Status</th></tr></thead>
            <tbody>${chkRows}</tbody>
          </table>` : ''}

          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Assinaturas</div>
          <div class="assinatura-row">
            <div class="assinatura-box">${assinaturaTecnicoHTML}<div class="linha">${f.tecnico_nome}<br>Técnico Executor</div></div>
            <div class="assinatura-box">${assinaturaFiscalHTML}<div class="linha">${fiscalNome}<br>Fiscal / Validador</div></div>
          </div>
        `;

      } else if (tipo === 'os') {
        const { data: os, error } = await db
          .from('ordens_servico')
          .select('*, equipamentos(tag, produto, bloco, setor, nr_serie), colaboradores(nome, assinatura_digital)')
          .eq('id', id)
          .single();

        if (error || !os) { mostrarErro('Ordem de Serviço não encontrada na base de dados.'); return; }

        const col    = os.colaboradores || {};
        const eq     = os.equipamentos  || {};
        const codigo = `OS-AC-${os.id.toString().slice(0,5).toUpperCase()}`;

        const statusCor = { 'Aberta':'#fef3c7','Em Andamento':'#dbeafe','Concluída':'#d1fae5' };
        const statusTxt = { 'Aberta':'#92400e','Em Andamento':'#1e40af','Concluída':'#065f46' };
        const st = os.status_os || 'Aberta';

        const assinaturaTecnicoHTML = col.assinatura_digital?.startsWith('data:image')
          ? `<img src="${col.assinatura_digital}" alt="Assinatura Técnico">`
          : `<div style="height:45px;border-bottom:1px dashed #94a3b8;"></div>`;

        document.getElementById('status-banner').className = 'status-banner valido';
        document.getElementById('status-texto').textContent = `✅ Documento autêntico — ${codigo}`;
        document.getElementById('spinner').remove();
        document.getElementById('corpo').innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <span class="tag-tipo tag-os">🛠️ O.S.</span>
            <strong style="font-size:15px;">${codigo}</strong>
            <span style="font-size:11px; font-weight:700; padding:2px 10px; border-radius:12px; margin-left:auto; background:${statusCor[st]||'#f1f5f9'}; color:${statusTxt[st]||'#374151'}">${st}</span>
          </div>

          <div class="field-group">
            <div class="field"><label>TAG do Ativo</label><span>${eq.tag || '—'}</span></div>
            <div class="field"><label>Equipamento</label><span>${eq.produto || '—'}</span></div>
            <div class="field"><label>Localização</label><span>${[eq.bloco, eq.setor].filter(Boolean).join(' › ') || '—'}</span></div>
            <div class="field"><label>Nº Série</label><span>${eq.nr_serie || '—'}</span></div>
            <div class="field"><label>Técnico Responsável</label><span>${col.nome || '—'}</span></div>
            <div class="field"><label>Tipo de Manutenção</label><span>${os.tipo_os || '—'}</span></div>
            <div class="field full"><label>Abertura da O.S.</label><span>${fmtDate(os.created_at)}</span></div>
          </div>

          ${os.descricao_defeito ? `
          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Descrição da Ocorrência</div>
          <p style="font-size:12px;line-height:1.6;color:#374151;">${os.descricao_defeito}</p>` : ''}

          ${os.laudo_tecnico ? `
          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">Diagnóstico / Ações</div>
          <p style="font-size:12px;line-height:1.6;color:#374151;">${os.laudo_tecnico}</p>` : ''}

          <hr class="divider">
          <div style="font-size:10px;color:#718096;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Assinatura do Técnico</div>
          <div class="assinatura-row">
            <div class="assinatura-box">${assinaturaTecnicoHTML}<div class="linha">${col.nome || '—'}<br>Técnico Executor</div></div>
          </div>
        `;
      } else {
        mostrarErro('Tipo de documento desconhecido.');
      }

    } catch (err) {
      mostrarErro('Erro ao consultar: ' + err.message);
    }
  }

  verificar();
</script>
</body>
</html>
