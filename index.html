<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PMOC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container" id="login-box">
        <h2>Acesso ao Sistema PMOC</h2>
        <input type="email" id="email" placeholder="Seu e-mail" required>
        <input type="password" id="password" placeholder="Sua senha" required>
        <button id="btn-login">Entrar</button>
        <button id="btn-cadastro" class="secondary">Cadastrar Nova Conta</button>
        <p id="mensagem" class="erro"></p>
    </div>

    <div class="dashboard-container" id="dashboard-box" style="display: none;">
        <h2>Painel do PMOC</h2>
        <p>Bem-vindo ao sistema! Você está logado com sucesso.</p>
        <button id="btn-logout">Sair do Sistema</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
<div id="area-pmoc" class="container">
    <h2>Cadastrar Manutenção PMOC</h2>
    <form id="form-manutencao">
        <input type="text" id="pmoc-cliente" placeholder="Nome do Cliente / Empresa" required>
        <input type="text" id="pmoc-equipamento" placeholder="Equipamento (Ex: Split 12000 BTUs)" required>
        <input type="text" id="pmoc-tag" placeholder="TAG / Identificação do Aparelho">
        
        <select id="pmoc-tipo" required>
            <option value="">Selecione o Tipo</option>
            <option value="Preventiva">Preventiva (Limpeza/Filtros)</option>
            <option value="Corretiva">Corretiva (Conserto/Peças)</option>
        </select>
        
        <textarea id="pmoc-descricao" placeholder="Descrição das atividades realizadas..." required></textarea>
        <input type="text" id="pmoc-tecnico" placeholder="Nome do Técnico Responsável" required>
        
        <button type="submit" id="btn-salvar-manutencao">Salvar Manutenção</button>
    </form>

    <hr>

    <h2>Relatórios de Manutenção</h2>
    <button id="btn-carregar-relatorio">Gerar e Visualizar Relatório Geral</button>
    
    <div id="lista-relatorios" class="tabela-relatorio"></div>
</div>
