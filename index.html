<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concredur — Acesso Integrado</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="login-page-wrapper">
    <div class="login-brand-area">
      <div class="login-logo-icon">🏗️</div>
      <div class="login-brand-name">MANUTENÇÃO <span>CONCREDUR</span></div>
      <div class="login-brand-sub">Sistema Integrado de Gestão de Manutenção</div>
    </div>
    <div class="login-card-panel">
      <h2 id="login-title">Acesso ao Sistema</h2>
      <p class="login-subtitle" id="login-desc">Informe suas credenciais para continuar</p>
      <div class="login-form-inputs">
        <div class="login-field-group">
          <label for="email">Usuário / E-mail</label>
          <div class="input-with-icon">
            <span class="field-icon">👤</span>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>
          </div>
        </div>
        <div class="login-field-group" id="login-password-group">
          <label for="password" id="lbl-password">Senha</label>
          <div class="input-with-icon">
            <span class="field-icon">🔑</span>
            <input type="password" id="password" placeholder="Digite sua senha">
          </div>
        </div>
      </div>
      <button id="btn-login" class="btn-login-submit"><span>➔</span> Entrar no Sistema</button>
      <div class="login-card-links">
        <a href="#" class="forgot-password-link" id="link-recuperar" onclick="toggleModoRecuperacao(true)">Recuperar Senha?</a>
        <a href="#" class="forgot-password-link" id="link-voltar" style="display:none;" onclick="toggleModoRecuperacao(false)">Voltar ao Login</a>
      </div>
      <p id="mensagem" class="erro"></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const paramsUrl = new URLSearchParams(window.location.search);
    let fluxoAtivacaoDireta = false;
    let emailAlvoAtivacao = "";

    // Intercepta a QueryString segura de ativação direta vinda do WhatsApp
    if (paramsUrl.get('email') && paramsUrl.get('token') === 'ativar_direto') {
      fluxoAtivacaoDireta = true;
      emailAlvoAtivacao = decodeURIComponent(paramsUrl.get('email'));
      
      document.getElementById('email').value = emailAlvoAtivacao;
      document.getElementById('email').readOnly = true; 
      
      document.getElementById('login-password-group').style.display = 'flex';
      document.getElementById('link-recuperar').style.display = 'none';
      document.getElementById('link-voltar').style.display = 'inline';
      
      document.getElementById('login-title').innerText = "Criar Senha de Acesso";
      document.getElementById('login-desc').innerText = "Defina sua senha definitiva abaixo para ativar a sua conta instantaneamente.";
      document.getElementById('lbl-password').innerText = "Nova Senha Definitiva";
      document.getElementById('btn-login').innerHTML = "<span>✓</span> Ativar e Entrar";
    }

    document.getElementById('btn-login').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg = document.getElementById('mensagem');
      if (!email) { alert("Por favor, preencha o campo de e-mail."); return; }

      // =======================================================================
      // ENGINE DE SEGURANÇA: ATIVAÇÃO DIRETA EXCLUSIVA (IGNORA SMTP)
      // =======================================================================
      if (fluxoAtivacaoDireta) {
        if (!password || password.length < 6) { alert("A senha de acesso precisa conter no mínimo 6 dígitos."); return; }
        msgForm('mensagem', 'Verificando e sincronizando credenciais...', 'blue');

        // ETAPA 1: Tenta realizar o registro limpo no Auth
        const { data: signUpData, error: signUpError } = await db.auth.signUp({
          email: emailAlvoAtivacao,
          password: password,
          options: { emailRedirectTo: null }
        });

        // Caso o usuário já exista na base devido a testes anteriores (Cenário da sua imagem)
        if (signUpError && signUpError.message.includes('already registered')) {
          console.log("Usuário detectado no Auth. Realizando login e vinculando senha nova...");
          
          // Se ele já existe, nós apenas fazemos o login direto usando a senha digitada
          const { error: loginError } = await db.auth.signInWithPassword({ email: emailAlvoAtivacao, password: password });
          
          if (!loginError) {
            await db.from('profiles').update({ status: 'ativo' }).eq('email', emailAlvoAtivacao);
            msgForm('mensagem', 'Conta operacional ativa! Redirecionando...', 'green');
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
            return;
          } else {
            msgForm('mensagem', 'Esta conta já foi criada. Digite a senha correta ou use a recuperação de senha.', 'red');
            return;
          }
        }

        // Intercepta e ignora os travamentos de falta de SMTP padrão do plano gratuito
        if (signUpError && signUpError.message.includes('confirmation email')) {
          console.log("Bypassando bloqueio de envio de confirmação de e-mail...");
          const { error: fallbackLoginError } = await db.auth.signInWithPassword({ email: emailAlvoAtivacao, password: password });
          
          if (!fallbackLoginError) {
            await db.from('profiles').update({ status: 'ativo' }).eq('email', emailAlvoAtivacao);
            msgForm('mensagem', 'Conta ativada com sucesso! Entrando...', 'green');
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
            return;
          }
        }

        if (signUpError) {
          msgForm('mensagem', 'Inconsistência na ativação: ' + signUpError.message, 'red');
        } else {
          // Registro de primeira viagem concluído sem erros
          await db.from('profiles').update({ status: 'ativo' }).eq('email', emailAlvoAtivacao);
          msgForm('mensagem', '✓ Conta ativada com sucesso!', 'green');
          setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
        }
        return;
      }

      // Fluxo de login e recuperação convencional
      if (modoRecuperacao) {
        msgForm('mensagem', 'Enfileirando link de recuperação...', 'blue');
        await db.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + "/index.html" });
        msgForm('mensagem', 'Se aplicável, instruções foram enviadas para o e-mail informado.', 'green');
      } else {
        if (!password) { alert("Por favor, informe sua senha."); return; }
        msgForm('mensagem', 'Verificando credenciais...', 'blue');
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) {
          msgForm('mensagem', 'Acesso negado: ' + error.message, 'red');
        } else {
          await db.from('profiles').update({ status: 'ativo' }).eq('email', email);
          window.location.href = "dashboard.html";
        }
      }
    });
  </script>
</body>
</html>
