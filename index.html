<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PMOC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="login-container" id="login-box">
    <h2>Acesso ao Sistema PMOC</h2>
    <input type="email" id="email" placeholder="Seu e-mail" required>
    <input type="password" id="password" placeholder="Sua senha" required>
    <button id="btn-login">Entrar</button>
    <button id="btn-cadastro" class="secondary">Cadastrar Nova Conta</button>
    <p id="mensagem" class="erro"></p>
  </div>

  <div class="app-container" id="app-box" style="display:none;">
    
    <aside class="sidebar no-print">
      <div class="sidebar-header">
        <h3>Sistema PMOC</h3>
        <p>Gestão de equipamentos</p>
      </div>
      <nav>
        <div class="nav-label">Cadastros</div>
        <div class="nav-item active" id="nav-equipamentos" onclick="showSection('equipamentos')">
          <span>🌡</span> Equipamentos
        </div>
        <div class="nav-item" id="nav-fichas" onclick="showSection('fichas')">
          <span>📋</span> Ficha PMOC
        </div>
        <div class="nav-item" id="nav-relatorios" onclick="showSection('relatorios')">
          <span>📊</span> Histórico / Relatórios
        </div>
      </nav>
      <div class="sidebar-footer">
        <button id="btn-logout" class="btn-sair">Sair do sistema</button>
      </div>
    </aside>

    <main class="main-content">
      
      <div id="section-equipamentos" class="app-section">
        <div class="topbar no-print">
          <h2>Cadastro de Equipamentos</h2>
        </div>
        
        <div class="section-content">
          <div class="card no-print">
            <h3 class="card-title">Novo equipamento</h3>
            <div class="form-grid">
              <div class="form-group">
                <label>Marca</label>
                <input type="text" id="eq-marca" placeholder="Ex: Carrier, Springer...">
              </div>
              <div class="form-group">
                <label>Potência</label>
                <input type="text" id="eq-potencia" placeholder="Ex: 9000 BTU, 12000 BTU...">
              </div>
              <div class="form-group">
                <label>TAG</label>
                <input type="text" id="eq-tag" placeholder="Ex: AR-01, EQ-023...">
              </div>
              <div class="form-group">
                <label>Patrimônio</label>
                <input type="text" id="eq-patrimonio" placeholder="Ex: 00123
