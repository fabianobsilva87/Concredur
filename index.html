<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PMOC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div class="login-container" id="login-box">
    <h2>Acesso ao Sistema PMOC</h2>
    <input type="email" id="email" placeholder="Seu e-mail" required>
    <input type="password" id="password" placeholder="Sua senha" required>
    <button id="btn-login">Entrar</button>
    <button id="btn-cadastro" class="secondary">Cadastrar Nova Conta</button>
    <p id="mensagem" class="erro"></p>
  </div>

  <!-- SISTEMA PRINCIPAL -->
  <div class="app-container" id="app-box" style="display:none;">
    
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>Sistema PMOC</h3>
        <p>Gestão de equipamentos</p>
      </div>
      <nav>
        <div class="nav-label">Cadastros</div>
        <div class="nav-item active" id="nav-equipamentos" onclick="showSection('equipamentos')">
          <span>🌡</span> Equipamentos
        </div>
      </nav>
      <div class="sidebar-footer">
        <button id="btn-logout" class="btn-sair">Sair do sistema</button>
      </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
      <div class="topbar">
        <h2>Cadastro de Equipamentos</h2>
      </div>

      <!-- SEÇÃO EQUIPAMENTOS -->
      <div id="section-equipamentos">

        <!-- FORMULÁRIO -->
        <div class="card">
          <h3 class="card-title">Novo equipamento</h3>
          <div class="form-grid">
            <div class="form-group">
              <label>Marca</label>
              <input type="text" id="eq-marca" placeholder="Ex: Carrier, Springer...">
            </div>
            <div class="form-group">
              <label>Potência</label>
              <input type="text" id="eq-potencia" placeholder="Ex: 9000 BTU, 12000 BTU...">
            </div>
            <div class="form-group">
              <label>TAG</label>
              <input type="text" id="eq-tag" placeholder="Ex: AR-01, EQ-023...">
            </div>
            <div class="form-group">
              <label>Patrimônio</label>
              <input type="text" id="eq-patrimonio" placeholder="Ex: 00123456...">
            </div>
          </div>
          <div class="btn-row">
            <button id="btn-salvar" class="btn-primary">+ Salvar equipamento</button>
            <button id="btn-limpar" class="btn-secondary">Limpar</button>
          </div>
          <p id="msg-equipamento" class="msg-form"></p>
        </div>

        <!-- TABELA -->
        <div class="card">
          <h3 class="card-title">Equipamentos cadastrados</h3>
          <div class="table-wrap">
            <table id="tabela-equipamentos">
              <thead>
                <tr>
                  <th>TAG</th>
                  <th>Marca</th>
                  <th>Potência</th>
                  <th>Patrimônio</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tbody-equipamentos">
                <tr><td colspan="5" style="text-align:center;color:#999;">Carregando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
