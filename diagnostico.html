<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico — Concredur</title>
  <script src="config.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 28px; }
    h2 { color: #38bdf8; margin-bottom: 6px; }
    .env { background: #fef08a; color: #713f12; border: 1px solid #fde047;
           padding: 8px 14px; border-radius: 6px; font-size: 12px;
           font-weight: 700; display: inline-block; margin-bottom: 18px; }
    .fields { display: flex; gap: 10px; flex-wrap: wrap; margin: 14px 0; }
    input  { background: #1e293b; border: 1px solid #334155; color: #e2e8f0;
             padding: 8px 12px; border-radius: 5px; width: 260px; font-size: 14px; }
    button { padding: 10px 26px; background: #2563eb; color: #fff;
             border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    button:hover { background: #1d4ed8; }
    #resultado { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
    .step { padding: 11px 16px; border-radius: 6px; background: #1e293b;
            border-left: 4px solid #475569; font-size: 13px; line-height: 1.6; }
    .ok   { border-color: #22c55e; color: #86efac; }
    .fail { border-color: #ef4444; color: #fca5a5; }
    .warn { border-color: #f59e0b; color: #fcd34d; }
    .run  { border-color: #38bdf8; color: #7dd3fc; }
    .info { border-color: #a78bfa; color: #ddd6fe; }
    pre   { background: #0f172a; padding: 8px; border-radius: 4px;
            overflow-x: auto; font-size: 11px; margin-top: 6px; color: #94a3b8; }
  </style>
</head>
<body>

<div class="env">
  🔌 Banco ativo: <strong id="lbl-banco"></strong>
</div>

<h2>🔍 Diagnóstico de Login — Concredur</h2>
<p style="color:#94a3b8;margin:8px 0 16px;">Preencha e clique em Testar. Cada passo mostra o resultado exato do Supabase.</p>

<div class="fields">
  <input type="email"    id="d-email" placeholder="seu@email.com">
  <input type="password" id="d-senha" placeholder="sua senha">
  <button onclick="rodarDiagnostico()">▶ Testar Agora</button>
</div>

<div id="resultado"></div>

<script>
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.getElementById('lbl-banco').textContent = SUPABASE_URL;

  function log(msg, tipo = 'run') {
    const d = document.createElement('div');
    d.className = 'step ' + tipo;
    d.innerHTML = msg;
    document.getElementById('resultado').appendChild(d);
    return d;
  }
  function pre(obj) {
    return '<pre>' + JSON.stringify(obj, null, 2) + '</pre>';
  }

  async function rodarDiagnostico() {
    document.getElementById('resultado').innerHTML = '';
    const email = document.getElementById('d-email').value.trim();
    const senha  = document.getElementById('d-senha').value;
    if (!email || !senha) { log('⚠️ Preencha e-mail e senha.', 'warn'); return; }

    // ── PASSO 1: Conectividade ──────────────────────────────────────
    log('⏳ Passo 1 — Testando conectividade com Supabase...', 'run');
    try {
      const r = await fetch(SUPABASE_URL + '/auth/v1/settings', { headers: { apikey: SUPABASE_ANON_KEY } });
      if (r.ok) log('✅ Passo 1 — Supabase acessível (HTTP ' + r.status + ')', 'ok');
      else { log('❌ Passo 1 — HTTP ' + r.status + ' — verifique URL e chave.', 'fail'); return; }
    } catch(e) { log('❌ Passo 1 — Falha de rede: ' + e.message, 'fail'); return; }

    // ── PASSO 2: Limpar sessão anterior ────────────────────────────
    log('⏳ Passo 2 — Verificando sessão em cache...', 'run');
    const { data: { user: uAtual } } = await db.auth.getUser();
    if (uAtual) {
      log('⚠️ Passo 2 — Sessão ativa para <strong>' + uAtual.email + '</strong>. Fazendo signOut...', 'warn');
      await db.auth.signOut();
      log('✅ Passo 2 — signOut OK.', 'ok');
    } else {
      log('✅ Passo 2 — Sem sessão em cache.', 'ok');
    }

    // ── PASSO 3: signInWithPassword ─────────────────────────────────
    log('⏳ Passo 3 — signInWithPassword("' + email + '")...', 'run');
    const { data: signInData, error: signInErr } = await db.auth.signInWithPassword({ email, password: senha });

    if (signInErr) {
      log(`❌ Passo 3 — signIn FALHOU.<br>
        <strong>Código:</strong> ${signInErr.status || 'N/A'}<br>
        <strong>Mensagem:</strong> ${signInErr.message}
        ${pre(signInErr)}`, 'fail');
      return;
    }

    // ── PASSO 3b: inspecionar data retornado ────────────────────────
    const user = signInData?.user;
    const sess = signInData?.session;

    if (!user) {
      log(`❌ Passo 3b — signIn retornou error=null MAS data.user=null.
        <br>Causa mais comum: e-mail <strong>não confirmado</strong> no Supabase Auth.
        <br>Solução: Supabase Dashboard → Authentication → Users → confirmar o e-mail manualmente.
        ${pre(signInData)}`, 'fail');
      return;
    }

    log(`✅ Passo 3 — signIn OK!<br>
      <strong>user.id:</strong> ${user.id}<br>
      <strong>user.email:</strong> ${user.email}<br>
      <strong>email_confirmed_at:</strong> ${user.email_confirmed_at || '⚠️ NULL — NÃO CONFIRMADO'}<br>
      <strong>last_sign_in_at:</strong> ${user.last_sign_in_at}<br>
      <strong>session.access_token:</strong> ${sess?.access_token ? sess.access_token.slice(0,30) + '...' : '❌ null'}`,
    'ok');

    if (!user.email_confirmed_at) {
      log('⚠️ Passo 3c — email_confirmed_at é null. O Supabase pode bloquear sessões com e-mail não confirmado dependendo da configuração do projeto.', 'warn');
    }

    // ── PASSO 4: SELECT na tabela profiles ──────────────────────────
    log('⏳ Passo 4 — SELECT em profiles por id = ' + user.id + '...', 'run');
    const { data: perfil, error: errPerfil } = await db
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .maybeSingle();

    if (errPerfil) {
      log('⚠️ Passo 4 — SELECT em profiles falhou.<br><strong>Erro:</strong> ' + errPerfil.message +
        '<br><strong>Causa provável:</strong> RLS bloqueando (profiles.id ≠ auth.uid() do usuário, ou política inexistente).' +
        pre(errPerfil), 'warn');
    } else if (!perfil) {
      log('⚠️ Passo 4 — Sem registro em profiles para este usuário. Será criado automaticamente pelo sistema.', 'warn');
    } else {
      log('✅ Passo 4 — Perfil encontrado!<br>' +
        '<strong>nome:</strong> ' + (perfil.nome || '—') + '<br>' +
        '<strong>role:</strong> ' + perfil.role + '<br>' +
        '<strong>status:</strong> ' + perfil.status +
        pre(perfil), 'ok');
    }

    // ── PASSO 5: Testar UPDATE em profiles ──────────────────────────
    log('⏳ Passo 5 — Testando UPDATE em profiles (status → ativo)...', 'run');
    const { error: errUpd } = await db
      .from('profiles')
      .update({ status: 'ativo' })
      .eq('id', user.id);
    if (errUpd) {
      log('⚠️ Passo 5 — UPDATE em profiles bloqueado: ' + errUpd.message +
        '<br>Isso <strong>não impede o login</strong> — o sistema trata como não-crítico.', 'warn');
    } else {
      log('✅ Passo 5 — UPDATE em profiles OK.', 'ok');
    }

    // ── PASSO 6: Testar SELECT em equipamentos (tabela principal) ────
    log('⏳ Passo 6 — Testando acesso às tabelas de negócio...', 'run');
    const { data: eqs, error: errEq } = await db
      .from('equipamentos').select('id').limit(1);
    if (errEq) {
      log('⚠️ Passo 6 — SELECT em equipamentos falhou: ' + errEq.message, 'warn');
    } else {
      log('✅ Passo 6 — Tabela equipamentos acessível (' + (eqs?.length || 0) + ' registros na amostra).', 'ok');
    }

    // ── PASSO 7: Simular redirect ────────────────────────────────────
    const dashUrl = window.location.origin +
      window.location.pathname.replace(/\/[^/]*$/, '') + '/dashboard.html';
    log('✅ Passo 7 — Diagnóstico concluído!<br>' +
      '<strong>Login funcionando.</strong> URL de redirect: <a href="' + dashUrl +
      '" style="color:#38bdf8;">' + dashUrl + '</a><br>' +
      '<br>Se a tela de login ainda trava sem mensagem, o problema é de <strong>cache do browser</strong>. ' +
      'Pressione <strong>Ctrl+Shift+R</strong> (hard reload) na página de login e tente novamente.', 'ok');
  }
</script>
</body>
</html>
